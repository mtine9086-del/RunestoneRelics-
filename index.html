<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runestone Relics | Luxury Heritage Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:Inter,sans-serif;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1518546305927-5a555bb7020d?auto=format&fit=crop&w=1800&q=80');
background-size:cover;
background-position:center;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(212,175,55,.12),
transparent 60%);
animation: glow 6s infinite alternate;
}

@keyframes glow{
from{opacity:.4;}
to{opacity:1;}
}

.hero-content{
position:relative;
text-align:center;
z-index:2;
max-width:900px;
padding:20px;
}

.logo{
width:220px;
margin-bottom:30px;
filter:drop-shadow(0 0 20px rgba(212,175,55,.5));
}

.hero h1{
font-family:Cinzel,serif;
font-size:4rem;
color:#d4af37;
letter-spacing:4px;
margin-bottom:20px;
}

.hero p{
font-size:1.2rem;
max-width:700px;
margin:auto;
line-height:1.8;
color:#ddd;
}

.btn{
display:inline-block;
margin-top:35px;
padding:15px 35px;
border:1px solid #d4af37;
color:#d4af37;
text-decoration:none;
transition:.4s;
}

.btn:hover{
background:#d4af37;
color:black;
}

.scroll{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:14px;
color:#aaa;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0);}
50%{transform:translate(-50%,10px);}
}

@media(max-width:768px){

.hero h1{
font-size:2.5rem;
}

.logo{
width:150px;
}

.hero p{
font-size:1rem;
}
}
</style>
</head>

<body>

<section class="hero">

<div class="hero-content">

<img src="images/logo.png" alt="Runestone Relics" class="logo">

<h1>RUNESTONE RELICS</h1>

<p>
A curated luxury collection of crystals, handcrafted jewelry,
Viking treasures, medieval artifacts, and timeless heritage pieces
inspired by ancient craftsmanship and legendary traditions.
</p>

<a href="#" class="btn">Explore Collection</a>

</div>

<div class="scroll">
Scroll Down ↓
</div>

</section>

</body>
</html>
